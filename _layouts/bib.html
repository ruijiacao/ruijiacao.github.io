---
---
{{ reference }}


<br>
{%- if entry.abstract %}
<a class="abstract btn btn-sm z-depth-0" role="button">Abs</a>
{%- endif %}
{%- if entry.eprint %}
    [<a style="font-weight:bold" href="http://arxiv.org/abs/{{ entry.eprint }}">PDF</a>]
{%- endif %}
{%- if entry.code %}
    [<a style="font-weight:bold" href="{{ entry.code }}" >Code</a>]
{%- endif %}
{%- if entry.slides %}
    {% if entry.slides contains '://' -%}
        [<a style="font-weight:bold" href="{{ entry.slides }}" >Slides</a>]
    {%- else -%}
        [<a style="font-weight:bold" href="{{ entry.slides | prepend: '/assets/pdf/' | relative_url }}" >Slides</a>]
    {%- endif %}
{%- endif %}
